services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stanza
      POSTGRES_PASSWORD: stanza
      POSTGRES_DB: stanzabonanza
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stanza -d stanzabonanza"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
